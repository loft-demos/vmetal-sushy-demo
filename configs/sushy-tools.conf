# sushy-tools emulator configuration
# This is a Python file — values are Python literals.
#
# start-sushy-tools.sh installs this to /etc/sushy-tools/emulator.conf
# and can override values from the .env file.
#
# Reference: https://docs.openstack.org/sushy-tools/latest/user/dynamic-emulator.html

# Listen on all interfaces so Ironic (running inside vCluster) can reach this endpoint.
# Set to the provisioning bridge IP (e.g. "172.22.0.1") to restrict to that interface.
SUSHY_EMULATOR_LISTEN_IP = u''

# Default port. Must match SUSHY_PORT in .env.
SUSHY_EMULATOR_LISTEN_PORT = 8000

# libvirt connection URI. qemu:///system connects via the system socket (requires
# the running user to be in the libvirt group, or the process to run as root).
SUSHY_EMULATOR_LIBVIRT_URI = u'qemu:///system'

# TLS — leave None for plain HTTP (fine for a local single-machine demo).
# Set to file paths to enable HTTPS:
#   SUSHY_EMULATOR_SSL_CERT = u'/etc/sushy-tools/cert.pem'
#   SUSHY_EMULATOR_SSL_KEY  = u'/etc/sushy-tools/key.pem'
SUSHY_EMULATOR_SSL_CERT = None
SUSHY_EMULATOR_SSL_KEY  = None

# HTTP basic auth — leave None to disable.
# To enable, set to the path of an htpasswd file:
#   SUSHY_EMULATOR_AUTH_FILE = u'/etc/sushy-tools/htpasswd'
# Generate with: htpasswd -cB /etc/sushy-tools/htpasswd admin
SUSHY_EMULATOR_AUTH_FILE = None
