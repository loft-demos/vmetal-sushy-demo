# gateway.yaml — the single demo Gateway
#
# Lives in the traefik namespace alongside the Traefik LoadBalancer service.
# MetalLB assigns GATEWAY_IP to the traefik service; the Gateway reflects that IP.
# The wildcard hostname listener accepts any *.VDEMO_DOMAIN subdomain and allows
# HTTPRoutes from all namespaces to attach.
#
# Applied by install-vcluster.sh with VDEMO_DOMAIN_PLACEHOLDER substituted from .env.

apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: demo-gateway
  namespace: traefik
spec:
  gatewayClassName: traefik
  listeners:
    - name: http
      port: 8000        # Traefik web entryPoint container port (Service maps 80→8000)
      protocol: HTTP
      hostname: "*.VDEMO_DOMAIN_PLACEHOLDER"
      allowedRoutes:
        namespaces:
          from: All
