# gatewayclass.yaml — GatewayClass for Envoy Gateway
#
# A GatewayClass is cluster-scoped and ties Gateway resources to the
# Envoy Gateway controller that was installed via Helm in vcluster.yaml.
#
# Applied by install-vcluster.sh after Envoy Gateway is ready.

apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: envoy
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
