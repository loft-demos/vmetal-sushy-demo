# gatewayclass.yaml — GatewayClass for Traefik v3
#
# A GatewayClass is cluster-scoped and ties Gateway resources to the
# Traefik controller installed via Helm in vcluster.yaml.
#
# Applied by install-vcluster.sh after Traefik is ready.

apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: traefik
spec:
  controllerName: traefik.io/gateway-controller
