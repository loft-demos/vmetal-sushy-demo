# httproute-vcp.yaml — HTTPRoute for vCluster Platform
#
# Routes vcp.VDEMO_DOMAIN → the vcluster-platform ClusterIP service.
# Lives in the vcluster-platform namespace alongside the service it routes to.
#
# Applied by install-vcluster.sh with __VDEMO_DOMAIN__ substituted from .env.
#
# To add another service (e.g. Argo CD), create a similar HTTPRoute in that
# service's namespace — no changes to the Gateway needed.

apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: vcluster-platform
  namespace: vcluster-platform
spec:
  parentRefs:
    - name: demo-gateway
      namespace: envoy-gateway-system
  hostnames:
    - "vcp.VDEMO_DOMAIN_PLACEHOLDER"
  rules:
    - backendRefs:
        - name: vcluster-platform
          port: 80
