# bmc-secret.yaml — BMC credential Secret template for BareMetalHost resources
#
# This is a TEMPLATE. Use hack/generate-bmh.sh to produce per-VM Secrets
# with correct names automatically from configs/vm-inventory.txt.
#
# If applying manually, duplicate this block for each demo VM and fill in
# the VM-specific name. Credentials should match BMC_USERNAME/BMC_PASSWORD
# in your .env (default: admin / password).
#
# Namespace must match the Metal3 namespace configured in the NodeProvider
# (default: metal3-system).

apiVersion: v1
kind: Secret
metadata:
  name: vmetal-small-1-bmc-creds   # <-- one per VM: <vm-name>-bmc-creds
  namespace: metal3-system
type: Opaque
stringData:
  username: admin     # matches BMC_USERNAME in .env
  password: password  # matches BMC_PASSWORD in .env
