apiVersion: apps/v1
kind: Deployment
metadata:
  name: one-cpu-demo
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: one-cpu-demo
  template:
    metadata:
      labels:
        app: one-cpu-demo
    spec:
      containers:
        - name: app
          image: busybox:1.36
          command: ["sh", "-c", "sleep 36000"]
          resources:
            requests:
              cpu: "1"
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 128Mi
