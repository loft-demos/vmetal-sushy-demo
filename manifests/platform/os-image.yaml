# os-image.yaml — default Ubuntu 24.04 LTS minimal OSImage for Metal3 provisioning
#
# Uses the Ubuntu minimal cloud image (~500 MB vs ~650 MB for full server image).
# Ironic downloads this URL and writes it directly to the VM disk.
# Additional generated OSImages can live under manifests/platform/os-images/.
#
# IMPORTANT: The IPA ramdisk running inside provisioning VMs has no DNS or internet
# access — it is isolated on the provisioning bridge (172.22.0.0/24). The image
# must be served from the host at PROVISION_IP (172.22.0.1) so Ironic can fetch it.
#
# Before applying:
#   bash scripts/cache-os-image.sh
# This downloads the default minimal image to /srv/os-images/, starts the
# os-image-server systemd service on http://172.22.0.1:9000/, and also writes
# manifests/platform/os-images/ubuntu-noble.yaml.
#
# Apply with:
#   kubectl apply -f manifests/platform/os-image.yaml
#
# Reference:
#   https://www.vcluster.com/docs/platform/use-platform/machines/os-images

apiVersion: management.loft.sh/v1
kind: OSImage
metadata:
  name: ubuntu-noble
spec:
  displayName: "Ubuntu 24.04 LTS (Minimal)"
  properties:
    metal3.vcluster.com/image-url: "http://172.22.0.1:9000/ubuntu-24.04-minimal-cloudimg-amd64.img"
    metal3.vcluster.com/image-checksum: "5c246768d1e99cebddedd31fb79a9bdc592e8bd04c90ecd252cbeb5ef9ea66ff"
    metal3.vcluster.com/image-checksum-type: "sha256"
