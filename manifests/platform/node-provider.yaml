# node-provider.yaml — Metal3 NodeProvider for the vmetal-sushy-demo
#
# This resource is applied to vCluster Platform (not to a workload cluster).
# It tells vMetal to deploy and manage Metal3, Ironic, DHCP, and Multus
# as a provider on the connected host cluster.
#
# Before applying:
#   1. Ensure the host cluster is connected to vCluster Platform and that
#      the cluster name below matches the name shown in the Platform UI.
#   2. Adjust the DHCP vip/bridge values if your provisioning network
#      differs from the defaults (172.22.0.0/24 / br-provision).
#
# Apply with:
#   kubectl apply -f manifests/platform/node-provider.yaml
#
# Reference:
#   https://www.vcluster.com/docs/platform/administer/node-providers/metal3

apiVersion: management.loft.sh/v1
kind: NodeProvider
metadata:
  name: metal3-provider
spec:
  displayName: "vMetal Demo - Metal3 Provider"

  properties:
    vcluster.com/ssh-keys: admin-macbook
    vcluster.com/user-data: |
      #cloud-config
      package_update: true
      packages:
        - ca-certificates
        - curl
        - htop
      write_files:
        - path: /etc/vcluster-common
          permissions: "0644"
          content: |
            common config
        - path: /usr/local/bin/configure-vdemo-node-bootstrap
          permissions: "0755"
          content: |
            #!/bin/sh
            set -eu

            iface="$(ip route show default 0.0.0.0/0 | awk 'NR==1 {print $5}')"
            [ -n "${iface}" ] || exit 1

            # systemd-resolved does not route *.local to unicast DNS unless the
            # suffix is configured explicitly as a search or routing domain for
            # the interface that owns the DNS server.
            resolvectl domain "${iface}" '~vdemo.local'
            # Route-only domains disable the link's implicit default-route
            # behavior unless we set it back explicitly.
            resolvectl default-route "${iface}" yes

            cert_tmp="$(mktemp)"
            tries=0
            while true; do
              if curl -fsSL "http://172.22.0.1:9000/vdemo-platform.crt" -o "${cert_tmp}"; then
                break
              fi
              tries=$((tries + 1))
              if [ "${tries}" -ge 20 ]; then
                echo "failed to download platform certificate after ${tries} attempts" >&2
                exit 1
              fi
              sleep 3
            done

            install -D -m 0644 "${cert_tmp}" /usr/local/share/ca-certificates/vdemo-platform.crt
            rm -f "${cert_tmp}"
            update-ca-certificates
            systemctl try-restart vcluster || true
        - path: /etc/systemd/system/vdemo-resolved-domain.service
          permissions: "0644"
          content: |
            [Unit]
            Description=Configure vdemo.local DNS routing and trust the platform certificate
            Wants=network-online.target
            After=network-online.target systemd-resolved.service

            [Service]
            Type=oneshot
            ExecStart=/usr/local/bin/configure-vdemo-node-bootstrap
            RemainAfterExit=yes

            [Install]
            WantedBy=multi-user.target
      runcmd:
        - systemctl daemon-reload
        - systemctl enable --now vdemo-resolved-domain.service

  metal3:
    # clusterRef identifies the connected host cluster where Metal3 and Ironic
    # will be deployed. Update `cluster` to match the name of the connected
    # cluster as it appears in vCluster Platform.
    clusterRef:
      cluster: loft-cluster
      namespace: metal3-system

    deploy:
      # Multus CNI is required so Ironic can attach network interfaces
      # directly to the provisioning bridge.
      multus:
        enabled: true
        helmValues: |
          namespace: kube-system

      # Metal3 and Ironic handle PXE boot, hardware inspection, and OS
      # provisioning. These run as platform-managed components; you do not
      # need to install them manually.
      metal3:
        enabled: true
        helmValues: |
          ironic:
            image:
              tag: release-32.0

      # The DHCP server is deployed by the provider and attached to the
      # provisioning bridge via a Multus NetworkAttachmentDefinition.
      # vip must be an unused IP on the provisioning subnet.
      # bridge must match the bridge name created by create-bridges.sh.
      dhcp:
        enabled: true
        helmValues: |
          networkAttachmentDefinition:
            vip: 172.22.0.2/24
            config: |
              {
                "cniVersion": "0.3.1",
                "type": "bridge",
                "bridge": "br-provision",
                "ipam": {}
              }

    # nodeTypes define classes of bare-metal machines the provider can claim.
    # The selector.matchLabels must match labels on BareMetalHost resources.
    # resources + properties (cpu/memory) declare node capacity so Karpenter
    # can make scale-from-zero scheduling decisions for dynamic node pools.
    # Each node type also gets an in-built property:
    #   vcluster.com/node-type = <node type name>
    # That lets a vCluster target one specific machine class cleanly.
    nodeTypes:
      - name: small-node
        resources:
          cpu: "2"
          memory: 4Gi
        bareMetalHosts:
          selector:
            matchLabels:
              demo: vmetal
              vmetal-size: small
        properties:
          vcluster.com/os-image: ubuntu-noble
          vcluster.com/cpu: "2"
          vcluster.com/memory: 4Gi

      - name: medium-node
        resources:
          cpu: "3"
          memory: 6Gi
        bareMetalHosts:
          selector:
            matchLabels:
              demo: vmetal
              vmetal-size: medium
        properties:
          vcluster.com/os-image: ubuntu-noble
          vcluster.com/cpu: "3"
          vcluster.com/memory: 6Gi

      - name: large-node
        resources:
          cpu: "4"
          memory: 8Gi
        bareMetalHosts:
          selector:
            matchLabels:
              demo: vmetal
              vmetal-size: large
        properties:
          vcluster.com/os-image: ubuntu-noble
          vcluster.com/cpu: "4"
          vcluster.com/memory: 8Gi
